<script>
// --- Main Firebase Loading Function ---
async function loadCardsFromFirebase() {
    try {
        const docRef = db.collection("data").doc("matrix_config");
        const doc = await docRef.get();

        if (doc.exists) {
            const data = doc.data();
            const cardsArray = data.cards || [];
            
            const container = document.getElementById('firebaseCardsContainer');
            container.innerHTML = ""; 

            let i = 0;
            while (i < cardsArray.length) {
                // Pattern: 2 Vertical Cards Group
                let verticalGroup = document.createElement('div');
                verticalGroup.className = 'mobile-vertical-group';
                
                for (let v = 0; v < 2 && i < cardsArray.length; v++, i++) {
                    // Type bhejenge taaki sahi class lage
                    verticalGroup.appendChild(createCardElementMixed(cardsArray[i]));
                }
                container.appendChild(verticalGroup);

                if (i >= cardsArray.length) break;

                // Pattern: Horizontal Scroll Row (Fixed for scroll)
                let horizontalScroll = document.createElement('div');
                horizontalScroll.className = 'mobile-horizontal-scroll-row';
                
                // Horizontal container scroll init (if not using drag-to-scroll)
                // (Agar drag-to-scroll lagaya hai toh yeh scroll-behavior smooth css se handle hoga)

                for (let h = 0; h < 3 && i < cardsArray.length; h++, i++) {
                    horizontalScroll.appendChild(createCardElementMixed(cardsArray[i]));
                }
                container.appendChild(horizontalScroll);
            }
        }
    } catch (error) {
        console.error("Error loading cards:", error);
    }
}

// --- Updated Helper Function to handle Mixed Layout AND Link Types ---
function createCardElementMixed(card) {
    const cardElement = document.createElement('div');
    // Dono layout mein 'mobile-utility-card' common class rahegi
    cardElement.className = 'mobile-utility-card'; 

    // Icon Box
    const iconBoxHTML = `
        <div class="card-icon-box" style="background-color: ${card.color || '#1e293b'}; color: #fff;">
            <i class="${card.icon || 'fas fa-star'}"></i>
        </div>
    `;

    // Text Info Box
    const infoBoxHTML = `
        <div class="card-info-box">
            <h4>${card.title || 'Service'}</h4>
            <p>${card.desc || 'Click to proceed'}</p>
        </div>
    `;

    cardElement.innerHTML = iconBoxHTML + infoBoxHTML;

    // --- CRITICAL LOGIC: Handle Click based on Firebase 'type' field ---
    cardElement.onclick = (e) => {
        e.preventDefault(); // Prevent default anchor behavior

        if (card.type === 'single' && card.url) {
            // **Case 1: Direct Open** (Agar 'type' 'single' hai)
            window.open(card.url, '_blank'); 

        } else if (card.type === 'multiple' && card.links && card.links.length > 0) {
            // **Case 2: Open Popup** (Agar 'type' 'multiple' hai)
            openMultiLinkPopup(card.title, card.links);

        } else if (!card.type && card.url) {
            // Fallback: Agar purana data hai jisme 'type' nahi hai, toh direct open karein
            window.open(card.url, '_blank');
            
        } else {
            console.warn("Card data incomplete:", card);
        }
    };

    return cardElement;
}


// --- Function to open the Popup Modal ---
const multiLinkModal = document.getElementById('multiLinkModal');
const modalTitle = document.getElementById('modalTitle');
const modalLinksList = document.getElementById('modalLinksList');
const modalCloseBtn = document.getElementById('modalCloseBtn');

function openMultiLinkPopup(title, linksArray) {
    // Title update karein
    modalTitle.textContent = title;
    
    // Purani list clear karein
    modalLinksList.innerHTML = "";

    // Nayee links dynamically generate karein
    linksArray.forEach(link => {
        const linkAnchor = document.createElement('a');
        linkAnchor.href = link.url;
        linkAnchor.target = '_blank';
        linkAnchor.className = 'modal-link-item';
        
        linkAnchor.innerHTML = `
            <span>${link.name || 'Visit Link'}</span>
            <i class="fas fa-external-link-alt"></i>
        `;
        
        modalLinksList.appendChild(linkAnchor);
    });

    // Popup show karein
    multiLinkModal.classList.add('active');
    document.body.style.overflow = 'hidden'; // Background scroll disable
}

// --- Function to close the Popup Modal ---
function closeMultiLinkPopup() {
    multiLinkModal.classList.remove('active');
    document.body.style.overflow = ''; // Background scroll enable
    // Optional: Kuch seconds baad links list clear kar sakte hain
}

// Event Listener for Close Button
modalCloseBtn.addEventListener('click', closeMultiLinkPopup);

// Event Listener for clicking outside the modal content to close it
multiLinkModal.addEventListener('click', (e) => {
    if (e.target === multiLinkModal) {
        closeMultiLinkPopup();
    }
});

// Page load hone par function call karein
document.addEventListener("DOMContentLoaded", () => {
    loadCardsFromFirebase();
});


</script>
