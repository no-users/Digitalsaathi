@keyframes pulse-pastel-cycle {
    0%   { background-color: #fca5a5; border-color: #fca5a5; box-shadow: 0 0 8px #fca5a5; } /* Light Red */
    10%  { background-color: #fdba74; border-color: #fdba74; box-shadow: 0 0 8px #fdba74; } /* Light Orange */
    20%  { background-color: #fde047; border-color: #fde047; box-shadow: 0 0 8px #fde047; } /* Light Yellow */
    30%  { background-color: #bef264; border-color: #bef264; box-shadow: 0 0 8px #bef264; } /* Light Lime */
    40%  { background-color: #6ee7b7; border-color: #6ee7b7; box-shadow: 0 0 8px #6ee7b7; } /* Light Emerald */
    50%  { background-color: #5eead4; border-color: #5eead4; box-shadow: 0 0 8px #5eead4; } /* Light Teal */
    60%  { background-color: #7dd3fc; border-color: #7dd3fc; box-shadow: 0 0 8px #7dd3fc; } /* Light Sky */
    70%  { background-color: #818cf8; border-color: #818cf8; box-shadow: 0 0 8px #818cf8; } /* Light Indigo */
    80%  { background-color: #c084fc; border-color: #c084fc; box-shadow: 0 0 8px #c084fc; } /* Light Purple */
    90%  { background-color: #f472b6; border-color: #f472b6; box-shadow: 0 0 8px #f472b6; } /* Light Pink */
    100% { background-color: #fca5a5; border-color: #fca5a5; box-shadow: 0 0 8px #fca5a5; } /* Cycle Back */
}

/* Dot ke liye */
.live-pulse-dot { 
    width: 10px; 
    height: 10px; 
    border-radius: 50%; 
    animation: pulse-pastel-cycle 20s infinite linear; /* Slow and smooth transition */
}

/* Ring ke liye */
.live-pulse-ring { 
    position: absolute; 
    width: 100%; 
    height: 100%; 
    border: 2px solid; 
    border-radius: 50%; 
    animation: pulse-glow-ring 2s infinite ease-out, pulse-pastel-cycle 20s infinite linear; 
}

/* Ring expansion animation wahi rahegi */
@keyframes pulse-glow-ring { 
    0% { transform: scale(0.6); opacity: 1; } 
    100% { transform: scale(1.8); opacity: 0; }

    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
}

/* Dropdown Container */
.tab-wrapper { position: relative; }

.dropdown-content {
    display: none;
    position: absolute;
    top: calc(100% + 10px);

    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    padding: 8px;
    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);

    /* Animation ke liye preparation */

    visibility: hidden;
    transform: translateY(10px);

}

/* Dropdown show hone ki smooth animation */

    display: block;
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

.dropdown-content a {
    display: block;
    padding: 11px 16px;
    text-decoration: none;

    font-size: 13.5px;
    border-radius: 10px;

}

    background: #f8fafc;

}

<body>
    <aside class="sidebar">
        <div class="sidebar-logo"><i class="fas fa-layer-group"></i>DIGITAL SAATHI</div>
        <ul class="menu-list" id="masterLiveSidebarMenu"></ul>
    </aside>

    <main class="main-content">
        <nav class="top-navbar">
            <div class="bread-crumb">Application &gt; <span id="breadCrumbStatus">Dashboard</span></div>
            
            <div class="tab-container">
                <div class="tab-item" onclick="window.open('Saathi.html', '_blank')">Saathi</div>
                
                <div class="tab-wrapper">
                    <div class="tab-item dropdown-trigger" onclick="togglePremiumDropdown('my-dropdown', event)">
                        Kits ▾
                    </div>
                    <!-- Dropdown content yahan hona zaroori hai -->
                    <div id="my-dropdown" class="dropdown-content">
                        <a href="#">Tool Kit 1</a>
                        <a href="#">Tool Kit 2</a>
                    </div>
                </div>
            </div>

            <div class="header-actions">
                <div class="search-box-wrap">
                    <input type="text" id="toolSearchField" placeholder="Type to search..." 
                           onkeyup="handleSearchKey(event)" 
                           onfocus="showHistory()">
                    <i class="fas fa-search"></i>
                    <div id="searchHistoryDropdown" class="search-history-dropdown"></div>
                </div>
                <a href="admin.html" class="btn-admin-route" target="_blank"><i class="fas fa-sliders-h"></i> Admin </a>
            </div>
        </nav>

        <div class="app-canvas">
            <div class="info-grid-row">
                <div class="premium-notice-hub-box">
                    <div class="live-pulse-container" style="margin-right: 15px;">
                        <div class="live-pulse-dot"></div>
                        <div class="live-pulse-ring"></div>
                    </div>
                    <div class="notice-text-details">
                        <span class="static-label">SYSTEM LIVE UPDATE:</span>
                        <div class="scrolling-text-wrapper">
                            <p id="liveNoticeBoardHeadlineText">Loading...</p>
                        </div>
                    </div>
                </div>

                <div class="premium-status-indicator">
                    <div>
                        <h5 style="font-weight: 700; color:#64748b; font-size:11px; text-transform:uppercase;">Clock Node</h5>
                        <p id="liveMatrixClock" style="font-size: 14.5px; font-weight:700; color:#4f46e5;">00:00:00 PM</p>
                    </div>
                    <i class="fas fa-network-wired" style="font-size:24px; color:#4f46e5;"></i>
                </div>
            </div>

                <div id="noResultsMessage" style="display: none;">
                    <i class="fas fa-search-minus" style="font-size: 32px; color: #4f46e5; margin-bottom: 12px; display: block;"></i>

                </div>
            </div>

                style="display: none; background: none; border: none; font-size: 20px; position: absolute; top: 20px; left: 20px; z-index: 1001;">
            <i class="fas fa-bars"></i>
        </button>

<script>
// 1. REAL-TIME FIREBASE SYNC
db.collection('data').doc('matrix_config').onSnapshot((doc) => {
    if (doc.exists) {
        renderUI(doc.data());
    }
});

// 2. RENDER LOGIC
function renderUI(config) {
    const sidebarMenu = document.getElementById('masterLiveSidebarMenu');
    const gridContainer = document.getElementById('toolsDisplayGrid');
    const noticeBoard = document.getElementById('liveNoticeBoardHeadlineText');

    sidebarMenu.innerHTML = '';
    // Grid saaf karein, lekin 'noResultsMessage' ko preserve karein
    const noResults = document.getElementById('noResultsMessage');
    gridContainer.innerHTML = '';
    gridContainer.appendChild(noResults); 
    
    if (noticeBoard) noticeBoard.innerText = config.notice || 'System Online';

    // RENDER FOLDERS, SUBS, AND LINKS
    config.folders.forEach((mainFolder, fIdx) => {
        const safeFolderName = mainFolder.name.replace(/\s+/g, '');
        const li = document.createElement('li');
        li.className = `menu-item ${fIdx === 0 ? 'open' : ''}`;
        
        li.innerHTML = `
            <div class="menu-link" data-type="main-folder">
                <div class="menu-link-content">
                    <i class="${mainFolder.icon}" style="color: var(--${mainFolder.color});"></i>
                    <span>${mainFolder.name}</span>
                </div>
                <i class="fas fa-chevron-down chevron-icon"></i>
            </div>
            <div class="submenu-container" id="container-${safeFolderName}"></div>
        `;
        sidebarMenu.appendChild(li);

        const subContainer = document.getElementById(`container-${safeFolderName}`);
        const matchingSubs = config.subs.filter(s => s.parent === mainFolder.name);

        matchingSubs.forEach(subPortal => {
            const subId = `subPortal-${subPortal.name.replace(/\s+/g, '')}`;
            const subDiv = document.createElement('div');
            subDiv.className = "submenu-link-toggle";
            subDiv.setAttribute('data-target', subId);
            subDiv.setAttribute('data-filter', subPortal.name.toLowerCase()); // Filter ke liye
            subDiv.innerHTML = `
                <span class="menu-link-content">
                    <i class="${subPortal.icon}" style="color: var(--${subPortal.color});"></i> ${subPortal.name}
                </span>
                <i class="fas fa-chevron-down nested-chevron"></i>
            `;
            subContainer.appendChild(subDiv);

            const nestedContainer = document.createElement('div');
            nestedContainer.className = "nested-submenu-container";
            nestedContainer.id = subId;

            const deepLinks = config.sideLinks.filter(l => l.parent === subPortal.name);
            deepLinks.forEach(dl => {
                const dlAnchor = document.createElement('a');
                dlAnchor.href = dl.url;
                dlAnchor.target = "_blank";
                dlAnchor.className = "nested-submenu-link";
                dlAnchor.innerHTML = `<i class="${dl.icon}" style="color: var(--${dl.color});"></i> ${dl.label}`;
                nestedContainer.appendChild(dlAnchor);
            });
            subContainer.appendChild(nestedContainer);
        });
    });

    // RENDER CARDS
    config.cards.forEach(card => {
        const anchor = document.createElement('a');
        anchor.href = card.url;
        anchor.target = "_blank";
        anchor.className = `service-card-block ${card.glow} tool-card-item`;
        // Search aur Filter ke liye attributes
        anchor.setAttribute('data-sub', card.parentSub ? card.parentSub.toLowerCase() : '');
        anchor.setAttribute('data-name', card.name.toLowerCase());
        anchor.setAttribute('data-desc', card.desc.toLowerCase());
        
        anchor.innerHTML = `
            <div class="square-icon-box"><i class="${card.icon}"></i></div>
            <div class="service-meta-text">
                <h4>${card.name}</h4>
                <p>${card.desc}</p>
            </div>
        `;
        gridContainer.appendChild(anchor);
    });
}

// 3. UNIVERSAL SEARCH & FILTER
function filterAndSearch() {
    const searchTerm = document.getElementById('toolSearchField').value.toLowerCase();
    const cards = document.querySelectorAll('.tool-card-item');
    const noResults = document.getElementById('noResultsMessage');
    let count = 0;

    cards.forEach(card => {
        const text = (card.getAttribute('data-name') + card.getAttribute('data-desc')).toLowerCase();
        if (text.includes(searchTerm)) {
            card.style.display = "flex";
            count++;
        } else {
            card.style.display = "none";
        }
    });

    noResults.style.display = count === 0 ? "block" : "none";
}

// 4. EVENT DELEGATION (Sidebar + Search)
// --- UPDATED SIDEBAR EVENT DELEGATION ---
document.getElementById('masterLiveSidebarMenu').addEventListener('click', function(e) {
    const breadCrumbStatus = document.getElementById('breadCrumbStatus');
    
    // Main Folder Click
    const menuLink = e.target.closest('.menu-link');
    if (menuLink) {
        menuLink.parentElement.classList.toggle('open');
        const folderName = menuLink.innerText.trim();
        if(breadCrumbStatus) breadCrumbStatus.innerText = folderName; // Status Update
    }

    // Sub Portal Click
    const subToggle = e.target.closest('.submenu-link-toggle');
    if (subToggle) {
        const targetId = subToggle.getAttribute('data-target');
        subToggle.classList.toggle('active-toggle-item');
        document.getElementById(targetId).classList.toggle('nested-open');
        
        // Status Update & Filter
        const subName = subToggle.innerText.trim();
        if(breadCrumbStatus) breadCrumbStatus.innerText = subName;
        
        const filterVal = subToggle.getAttribute('data-filter');
        const cards = document.querySelectorAll('.tool-card-item');
        cards.forEach(c => {
            c.style.display = (c.getAttribute('data-sub') === filterVal) ? "flex" : "none";
        });
    }
});
// SEARCH INPUT LISTENER
document.getElementById('toolSearchField').addEventListener('input', filterAndSearch);

// CLOCK
setInterval(() => {
    const clock = document.getElementById('liveMatrixClock');
    if(clock) clock.innerText = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
}, 1000);
</script>

    
</body>
